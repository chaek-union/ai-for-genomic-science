<script>
// ─── LANGUAGE ─────────────────────────────────────────────
let lang = 'ko';
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  document.querySelectorAll('[data-' + l + ']').forEach(el => { el.textContent = el.dataset[l]; });
  renderAll();
}

// ─── HERO PARTICLES ───────────────────────────────────────
(function() {
  const canvas = document.getElementById('hero-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, dots;
  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    dots = Array.from({length:180}, () => ({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+.4,
      vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28,
      a:Math.random()
    }));
  }
  window.addEventListener('resize', resize); resize();
  (function draw() {
    ctx.clearRect(0,0,W,H);
    dots.forEach(d=>{
      d.x+=d.vx; d.y+=d.vy;
      if(d.x<0)d.x=W; if(d.x>W)d.x=0;
      if(d.y<0)d.y=H; if(d.y>H)d.y=0;
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(196,163,90,${d.a*.55})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

// ─── PLOTLY DEFAULTS ──────────────────────────────────────
const PBASE = {
  paper_bgcolor:'rgba(0,0,0,0)',
  plot_bgcolor:'rgba(20,20,31,1)',
  font:{color:'#e4e0d8',family:'Georgia,serif'},
  xaxis:{gridcolor:'#22222e',zerolinecolor:'#22222e'},
  yaxis:{gridcolor:'#22222e',zerolinecolor:'#22222e'},
  margin:{t:40,r:20,b:60,l:60}
};
const CFG = {displayModeBar:false,responsive:true};

// ─── SECTION 1: 3D EMBEDDING ──────────────────────────────
const EMBED_TERMS = {
  // Gene regulation cluster (green)
  reg: [
    {t:'transcription factor', tko:'전사인자',    x:1.2, y:0.8, z:0.5,  sz:14},
    {t:'promoter',             tko:'프로모터',    x:1.5, y:1.2, z:0.2,  sz:13},
    {t:'enhancer',             tko:'인핸서',      x:0.9, y:1.4, z:0.7,  sz:12},
    {t:'silencer',             tko:'사일런서',    x:1.1, y:0.5, z:1.0,  sz:9},
    {t:'CTCF',                 tko:'CTCF',        x:0.7, y:1.0, z:0.3,  sz:10},
    {t:'chromatin',            tko:'크로마틴',    x:1.8, y:0.6, z:0.9,  sz:11},
    {t:'histone',              tko:'히스톤',      x:1.4, y:1.6, z:1.1,  sz:12},
    {t:'epigenome',            tko:'후성유전체',  x:0.6, y:1.8, z:0.8,  sz:10},
  ],
  // Cell cycle cluster (blue)
  cell: [
    {t:'CDK',        tko:'CDK',          x:-1.4, y:0.5, z:0.3,  sz:11},
    {t:'cyclin',     tko:'사이클린',     x:-1.8, y:0.2, z:0.7,  sz:12},
    {t:'p53',        tko:'p53',          x:-1.1, y:0.8, z:1.1,  sz:13},
    {t:'apoptosis',  tko:'세포자살',     x:-1.6, y:1.0, z:0.4,  sz:11},
    {t:'mitosis',    tko:'유사분열',     x:-1.3, y:-0.2,z:0.8,  sz:10},
    {t:'checkpoint', tko:'체크포인트',   x:-0.9, y:0.3, z:1.4,  sz:10},
  ],
  // Immune cluster (purple)
  imm: [
    {t:'antibody',    tko:'항체',        x:0.3, y:-1.6, z:0.5,  sz:13},
    {t:'T cell',      tko:'T 세포',      x:0.8, y:-1.4, z:0.2,  sz:12},
    {t:'B cell',      tko:'B 세포',      x:-0.2,y:-1.8, z:0.7,  sz:12},
    {t:'cytokine',    tko:'사이토카인',  x:0.5, y:-1.1, z:1.1,  sz:10},
    {t:'antigen',     tko:'항원',        x:1.0, y:-1.5, z:0.9,  sz:11},
    {t:'MHC',         tko:'MHC',         x:-0.4,y:-1.2, z:0.3,  sz:10},
  ]
};

function renderEmbed3D() {
  const traces = [
    {cluster:'reg', color:'#4ade80', nameKo:'유전자 조절 용어', nameEn:'Gene regulation terms'},
    {cluster:'cell',color:'#38bdf8', nameKo:'세포 주기 용어',   nameEn:'Cell cycle terms'},
    {cluster:'imm', color:'#a78bfa', nameKo:'면역 용어',         nameEn:'Immune terms'},
  ].map(({cluster,color,nameKo,nameEn}) => {
    const pts = EMBED_TERMS[cluster];
    return {
      type:'scatter3d', mode:'markers+text',
      name: lang==='ko' ? nameKo : nameEn,
      x:pts.map(p=>p.x), y:pts.map(p=>p.y), z:pts.map(p=>p.z),
      text:pts.map(p=>lang==='ko'?p.tko:p.t),
      textposition:'top center',
      textfont:{color,size:9},
      marker:{color, size:pts.map(p=>p.sz), opacity:0.8, line:{color:'rgba(255,255,255,0.15)',width:1}},
      hovertemplate:pts.map(p=>`<b>${lang==='ko'?p.tko:p.t}</b><br>${lang==='ko'?'빈도 반영 크기':'Size reflects frequency'}: ${p.sz}<extra></extra>`)
    };
  });

  Plotly.newPlot('plot-embed3d', traces, {
    paper_bgcolor:'rgba(0,0,0,0)',
    font:{color:'#e4e0d8',family:'Georgia,serif'},
    scene:{
      xaxis:{gridcolor:'#22222e',zerolinecolor:'#22222e',backgroundcolor:'rgba(20,20,31,1)',title:{text:'Dim 1',font:{color:'#7a756d',size:10}}},
      yaxis:{gridcolor:'#22222e',zerolinecolor:'#22222e',backgroundcolor:'rgba(20,20,31,1)',title:{text:'Dim 2',font:{color:'#7a756d',size:10}}},
      zaxis:{gridcolor:'#22222e',zerolinecolor:'#22222e',backgroundcolor:'rgba(20,20,31,1)',title:{text:'Dim 3',font:{color:'#7a756d',size:10}}},
      bgcolor:'rgba(20,20,31,1)',
    },
    title:{text:lang==='ko'?'생물학 용어 3D 임베딩 공간 (t-SNE 투영)':'Biological Term 3D Embedding Space (t-SNE projection)',font:{size:13,color:'#e4e0d8'}},
    legend:{bgcolor:'rgba(0,0,0,0)',font:{color:'#e4e0d8',size:11}},
    margin:{t:50,r:20,b:20,l:20}
  }, {...CFG, displayModeBar:true, modeBarButtonsToRemove:['toImage']});
}

// ─── SECTION 2: MASKED LANGUAGE MODELING ─────────────────
const MASK_DATA = {
  tf: {
    sentKo: 'The [MASK] binds to the promoter and activates transcription',
    sentEn: 'The [MASK] binds to the promoter and activates transcription',
    predsKo: ['전사인자','단백질','효소','리프레서','활성화인자'],
    predsEn: ['transcription factor','protein','enzyme','repressor','activator'],
    probs:   [0.35, 0.22, 0.16, 0.14, 0.13],
    noteKo: '가장 높은 예측 확률: "전사인자"(35%). "프로모터에 결합"이라는 문맥이 전사인자를 강하게 연상시킵니다.',
    noteEn: 'Highest predicted probability: "transcription factor" (35%). The context "binds to the promoter" strongly implies a transcription factor.',
  },
  dna: {
    sentKo: 'The CRISPR-Cas9 system uses guide RNA to target [MASK] sequences',
    sentEn: 'The CRISPR-Cas9 system uses guide RNA to target [MASK] sequences',
    predsKo: ['DNA','게놈','특정','상보적','표적'],
    predsEn: ['DNA','genomic','specific','complementary','target'],
    probs:   [0.42, 0.28, 0.14, 0.09, 0.07],
    noteKo: '"DNA"가 가장 높은 확률(42%)을 받습니다. CRISPR-Cas9 문맥에서 모델이 DNA 절단 메커니즘을 학습했습니다.',
    noteEn: '"DNA" receives the highest probability (42%). The model has learned CRISPR-Cas9\'s DNA cutting mechanism from the training corpus.',
  },
  cell: {
    sentKo: 'Histone acetylation is associated with [MASK] gene expression',
    sentEn: 'Histone acetylation is associated with [MASK] gene expression',
    predsKo: ['활성화된','증가된','높은','향상된','촉진된'],
    predsEn: ['activated','increased','elevated','enhanced','promoted'],
    probs:   [0.38, 0.27, 0.18, 0.10, 0.07],
    noteKo: '"활성화된"이 38%의 확률로 예측됩니다. 히스톤 아세틸화가 유전자 활성화와 연관되는 생물학적 지식을 모델이 습득했습니다.',
    noteEn: '"Activated" is predicted with 38% probability. The model has acquired the biological knowledge that histone acetylation is associated with gene activation.',
  },
  disease: {
    sentKo: 'A missense variant in BRCA1 [MASK] its tumor suppressor function',
    sentEn: 'A missense variant in BRCA1 [MASK] its tumor suppressor function',
    predsKo: ['손상시킨다','방해한다','파괴한다','감소시킨다','변경한다'],
    predsEn: ['disrupts','impairs','abolishes','reduces','alters'],
    probs:   [0.34, 0.25, 0.20, 0.12, 0.09],
    noteKo: '"손상시킨다"(34%)가 1위. BRCA1 미스센스 변이는 기능 손실과 연관된다는 임상 지식을 모델이 학습했음을 시사합니다.',
    noteEn: '"Disrupts" (34%) ranks first, suggesting the model has learned the clinical knowledge that BRCA1 missense variants are associated with loss of function.',
  }
};

function renderMask() {
  const key = document.getElementById('mask-select').value;
  const d = MASK_DATA[key];
  const preds = lang==='ko' ? d.predsKo : d.predsEn;
  const sentHtml = (lang==='ko'?d.sentKo:d.sentEn).replace('[MASK]','<span class="mask-token">[MASK]</span>');
  document.getElementById('mask-sentence').innerHTML = sentHtml;

  const colors = d.probs.map((_,i) => i===0 ? '#c4a35a' : '#38bdf8');

  Plotly.newPlot('plot-mask', [{
    type:'bar',
    orientation:'h',
    y:[...preds].reverse(),
    x:[...d.probs].reverse(),
    marker:{color:[...colors].reverse(), opacity:0.8},
    text:[...d.probs].map(p=>`${(p*100).toFixed(0)}%`).reverse(),
    textposition:'outside',
    textfont:{color:'#e4e0d8',size:12},
    hovertemplate:'<b>%{y}</b><br>'+(lang==='ko'?'확률':'Probability')+': %{x:.0%}<extra></extra>'
  }], {
    ...PBASE,
    title:{text:lang==='ko'?'[MASK] 토큰의 상위 5개 예측':'Top 5 Predictions for [MASK] Token',font:{size:13,color:'#e4e0d8'}},
    xaxis:{...PBASE.xaxis,range:[0,0.6],title:{text:lang==='ko'?'예측 확률':'Predicted probability',font:{color:'#7a756d',size:11}},tickformat:'.0%'},
    yaxis:{...PBASE.yaxis,tickfont:{size:12,color:'#e4e0d8'}},
    margin:{t:50,r:80,b:65,l:160},
    showlegend:false
  }, CFG);

  document.getElementById('mask-note').textContent = lang==='ko' ? d.noteKo : d.noteEn;
}

// ─── SECTION 3: TRANSFER LEARNING PIPELINE ────────────────
function renderTransfer() {
  const stagesKo = [
    '무작위 분류기\n(기준선)',
    '사전 훈련\n(1000만 서열)',
    '파인튜닝\n(5,000 레이블 변이)',
    '최종 모델\n(배포)'
  ];
  const stagesEn = [
    'Random classifier\n(baseline)',
    'Pre-training\n(10M sequences)',
    'Fine-tuning\n(5,000 labeled variants)',
    'Final model\n(deployed)'
  ];
  const stages = lang==='ko' ? stagesKo : stagesEn;
  const accuracies = [50, 65, 92, 92];
  const deltas    = [50, 15, 27,  0]; // waterfall increments

  // Waterfall: measure, delta, measure, delta...
  const colors = ['#7a756d','#4ade80','#4ade80','rgba(196,163,90,0.8)'];
  const base   = [0, 50, 65, 0];

  const traceBars = {
    type:'bar',
    x: stages,
    y: deltas,
    base: base,
    marker:{color:colors, opacity:0.85, line:{color:'rgba(255,255,255,0.12)',width:1}},
    text: accuracies.map((a,i) => i===3 ? `${a}%` : `${a}%`),
    textposition:'outside',
    textfont:{color:'#e4e0d8',size:13},
    hovertemplate: stages.map((s,i)=>`<b>${s.replace('\n',' ')}</b><br>${lang==='ko'?'정확도':'Accuracy'}: ${accuracies[i]}%<extra></extra>`)
  };

  // Connector lines
  const shapes = [0,1,2].map(i=>({
    type:'line',
    x0:i+0.45, x1:i+0.55,
    y0:accuracies[i], y1:accuracies[i],
    line:{color:'rgba(255,255,255,0.3)',width:1.5,dash:'dot'}
  }));

  const gainAnnotations = [
    {x:1,y:65+8,text:`+15pp`,font:{color:'#4ade80',size:12},showarrow:false,xanchor:'center'},
    {x:2,y:92+8,text:`+27pp`,font:{color:'#4ade80',size:12},showarrow:false,xanchor:'center'},
  ];

  Plotly.newPlot('plot-transfer', [traceBars], {
    ...PBASE,
    title:{text:lang==='ko'?'전이 학습 단계별 변이 분류 정확도':'Variant Classification Accuracy Across Transfer Learning Stages',font:{size:13,color:'#e4e0d8'}},
    yaxis:{...PBASE.yaxis,range:[0,110],title:{text:lang==='ko'?'분류 정확도 (%)':'Classification accuracy (%)',font:{color:'#7a756d',size:11}},
      tickvals:[0,25,50,75,92,100],ticktext:['0%','25%','50%','75%','92%','100%']},
    xaxis:{...PBASE.xaxis,tickfont:{size:11,color:'#e4e0d8'}},
    shapes,
    annotations:[
      ...gainAnnotations,
      {x:0,y:57,text:lang==='ko'?'기준선 50%':'Baseline 50%',font:{color:'#7a756d',size:10},showarrow:false},
      {x:1,y:72,text:lang==='ko'?'사전 훈련 완료':'Post pre-train',font:{color:'#4ade80',size:10},showarrow:false},
      {x:2,y:99,text:lang==='ko'?'파인튜닝 후 배포':'Fine-tuned & deployed',font:{color:'#c4a35a',size:10},showarrow:false},
    ],
    margin:{t:55,r:20,b:90,l:70},
    showlegend:false
  }, CFG);
}

function renderAll() {
  renderEmbed3D();
  renderMask();
  renderTransfer();
}
document.addEventListener('DOMContentLoaded', () => { setLang('ko'); });
</script>
</body>
</html>
