<style>
:root{--bg:#0b0b11;--card:#14141f;--text:#e4e0d8;--muted:#7a756d;--gold:#c4a35a;--gold-dim:rgba(196,163,90,.12);--green:#4ade80;--red:#f87171;--blue:#38bdf8;--purple:#a78bfa;--line:#22222e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Noto Serif KR',serif;line-height:1.7;overflow-x:hidden}

.lang-toggle{position:fixed;top:1rem;right:1.5rem;z-index:100;display:flex;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);background:rgba(11,11,17,.7)}
.lang-btn{background:0;color:rgba(255,255,255,.4);border:0;padding:.35rem .8rem;cursor:pointer;font:700 .78rem/1 system-ui;transition:.2s}
.lang-btn.active{color:#fff;background:rgba(255,255,255,.1)}

.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;position:relative;overflow:hidden}
.hero-ch{font:700 .82rem/1 'SF Mono',monospace;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem}
.hero h1{font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(2.4rem,6.5vw,5rem);line-height:1.05;letter-spacing:-.02em;color:#fff;max-width:900px;margin-bottom:1.5rem}
.hero-sub{font-size:1.05rem;color:var(--muted);max-width:560px;line-height:1.6}
.hero-scroll{position:absolute;bottom:2.5rem;color:var(--muted);font:.8rem/1.2 system-ui;animation:bob 2s ease-in-out infinite;cursor:pointer;text-align:center}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

.section{padding:5rem 2rem;max-width:920px;margin:0 auto}
.section-label{font:700 .78rem/1 'SF Mono',monospace;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.8rem}
.section-title{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.1;color:#fff;margin-bottom:1.2rem}
.section-body{font-size:1rem;color:var(--muted);line-height:1.8;max-width:700px;margin-bottom:2rem}
.insight-box{background:rgba(196,163,90,.06);border:1px solid rgba(196,163,90,.2);border-radius:10px;padding:1.2rem 1.5rem;margin:1.5rem 0;font:.95rem/1.7 Georgia,serif;color:var(--text)}
.insight-box strong{color:var(--gold)}
hr.divider{border:none;border-top:1px solid var(--line);margin:5rem 0}

.plot-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:2rem 2rem 1.5rem;overflow:hidden}
.plot-caption{font:.88rem/1.6 system-ui;color:var(--muted);margin-top:1rem;padding-top:1rem;border-top:1px solid var(--line)}

.ctrl-row{display:flex;align-items:center;gap:1.2rem;flex-wrap:wrap;margin:1.2rem 0}
.ctrl-label{font:.85rem/1.3 system-ui;color:var(--muted);min-width:150px;flex-shrink:0}
.ctrl-label span{color:var(--gold);font-weight:700;font-family:'SF Mono',monospace}
input[type=range]{flex:1;min-width:180px;height:4px;border-radius:2px;-webkit-appearance:none;background:var(--line);outline:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}

.toggle-group{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}
.toggle-btn{padding:.4rem .9rem;border-radius:6px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--muted);font:.82rem/1 system-ui;cursor:pointer;transition:.2s}
.toggle-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}
.toggle-btn.act-sig{background:rgba(248,113,113,.12);border-color:#f87171;color:#f87171}
.toggle-btn.act-tanh{background:rgba(167,139,250,.12);border-color:#a78bfa;color:#a78bfa}
.toggle-btn.act-relu{background:rgba(74,222,128,.12);border-color:#4ade80;color:#4ade80}
.toggle-btn.act-lrelu{background:rgba(56,189,248,.12);border-color:#38bdf8;color:#38bdf8}

.stat-row{display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0}
.stat-chip{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:8px;padding:.6rem 1rem;text-align:center;flex:1;min-width:100px}
.stat-chip .v{font:700 1.4rem/1.2 'Playfair Display',serif;color:var(--gold)}
.stat-chip .l{font:.72rem/1.2 system-ui;color:var(--muted);margin-top:.2rem;text-transform:uppercase;letter-spacing:.05em}

.page-footer{text-align:center;padding:4rem 2rem;border-top:1px solid var(--line);color:var(--muted);font:.85rem/1.6 system-ui}
.page-footer a{color:var(--gold);text-decoration:none}
</style>

<body>

<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('ko')">KO</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-ch">Chapter 3</div>
  <h1 data-ko="신경망: 기계가 패턴을<br>학습하는 방법" data-en="Neural Networks:<br>How Machines Learn Patterns"></h1>
  <p class="hero-sub" data-ko="활성화 함수, 결정 경계, 과적합 — 신경망의 핵심 개념을 인터랙티브 시각화로 이해하세요." data-en="Activation functions, decision boundaries, overfitting — understand the core concepts of neural networks through interactive visualization."></p>
  <div class="hero-scroll" onclick="document.querySelector('.section').scrollIntoView({behavior:'smooth'})">↓<br><span data-ko="아래로 스크롤" data-en="Scroll down"></span></div>
</section>

<!-- SECTION 1: Activation Functions -->
<section class="section">
  <h2 class="section-title" data-ko="활성화 함수 비교" data-en="Activation Functions Compared"></h2>
  <p class="section-body" data-ko="활성화 함수는 뉴런이 신호를 전달할지 결정합니다. Sigmoid는 약물 용량-반응 곡선처럼 부드럽게 포화됩니다. ReLU는 유전자 발현의 on/off 스위치와 유사합니다. 아래 버튼으로 함수를 켜고 끄면서 특성을 비교하세요." data-en="Activation functions determine how a neuron transmits signals. Sigmoid saturates smoothly like a drug dose-response curve. ReLU resembles a gene expression on/off switch. Toggle functions below to compare their properties."></p>

  <div class="plot-card">
    <div class="toggle-group" id="act-toggles">
      <button class="toggle-btn act-sig active" onclick="toggleAct('sigmoid')" id="btn-sigmoid">Sigmoid</button>
      <button class="toggle-btn act-tanh active" onclick="toggleAct('tanh')" id="btn-tanh">Tanh</button>
      <button class="toggle-btn act-relu active" onclick="toggleAct('relu')" id="btn-relu">ReLU</button>
      <button class="toggle-btn act-lrelu active" onclick="toggleAct('lrelu')" id="btn-lrelu">Leaky ReLU</button>
    </div>
    <div id="act-plot" style="height:380px;"></div>
    <div class="plot-caption" data-ko="x축: 입력값 (−5 ~ 5). 각 함수의 특성에 주목하세요. Sigmoid/Tanh: 극단값에서 기울기 소실(vanishing gradient). ReLU: 음수 입력에서 '죽은 뉴런(dead neuron)' 문제. Leaky ReLU: 이를 작은 음수 기울기(0.01)로 해결." data-en="x-axis: input value (−5 to 5). Note: Sigmoid/Tanh exhibit vanishing gradients at extremes. ReLU creates 'dead neurons' for negative inputs. Leaky ReLU solves this with a small negative slope (0.01)."></div>
  </div>

  <div class="insight-box" data-ko="<strong>생물학적 유사성:</strong> Sigmoid는 Hill 방정식(효소 동역학)과 같은 S자 포화 곡선입니다. ReLU는 전사인자의 임계값(threshold) 활성화와 유사합니다. 딥러닝에서 활성화 함수는 비선형성을 부여합니다 — 이 없이는 여러 레이어를 쌓아도 선형 모델과 같습니다." data-en="<strong>Biological analogy:</strong> Sigmoid mirrors the Hill equation (enzyme kinetics) — an S-shaped saturation curve. ReLU resembles threshold activation of a transcription factor. Without nonlinear activation functions, stacking multiple layers is mathematically equivalent to a single linear model."></div>
</section>

<hr class="divider">

<!-- SECTION 2: Single Neuron Decision Boundary -->
<section class="section">
  <h2 class="section-title" data-ko="단일 뉴런의 결정 경계" data-en="Single Neuron Decision Boundary"></h2>
  <p class="section-body" data-ko="변이체를 병원성(빨간색) vs 양성(파란색)으로 분류하는 단일 뉴런을 시뮬레이션합니다. x축은 진화적 보존도, y축은 구조적 영향 점수입니다. 슬라이더로 가중치(w₁, w₂)와 편향(b)을 조정해 결정 경계선을 직접 움직여보세요." data-en="Simulate a single neuron classifying variants as pathogenic (red) vs benign (blue). x-axis: evolutionary conservation, y-axis: structural impact score. Adjust weights (w₁, w₂) and bias (b) with sliders to move the decision boundary."></p>

  <div class="plot-card">
    <div class="ctrl-row">
      <div class="ctrl-label" data-ko="w₁ (보존도): <span id='w1-val'>2.0</span>" data-en="w₁ (conservation): <span id='w1-val'>2.0</span>"></div>
      <input type="range" id="w1-slider" min="-5" max="5" step="0.1" value="2.0" oninput="updateBoundary()">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label" data-ko="w₂ (구조적 영향): <span id='w2-val'>1.5</span>" data-en="w₂ (structural impact): <span id='w2-val'>1.5</span>"></div>
      <input type="range" id="w2-slider" min="-5" max="5" step="0.1" value="1.5" oninput="updateBoundary()">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label" data-ko="b (편향): <span id='b-val'>-3.0</span>" data-en="b (bias): <span id='b-val'>-3.0</span>"></div>
      <input type="range" id="b-slider" min="-8" max="2" step="0.1" value="-3.0" oninput="updateBoundary()">
    </div>
    <div class="stat-row" id="boundary-stats"></div>
    <div id="boundary-plot" style="height:400px;"></div>
    <div class="plot-caption" data-ko="결정 경계: w₁x + w₂y + b = 0. 금색 선 위쪽(w₁x + w₂y + b > 0)을 병원성으로 분류합니다. 정확도가 실시간으로 업데이트됩니다." data-en="Decision boundary: w₁x + w₂y + b = 0. Points above the gold line (w₁x + w₂y + b > 0) are classified as pathogenic. Accuracy updates in real time."></div>
  </div>

  <div class="insight-box" data-ko="<strong>한계와 시사점:</strong> 단일 뉴런(퍼셉트론)은 선형 분리 가능한 문제만 풀 수 있습니다. 실제 변이체 데이터는 비선형적입니다. 여러 레이어를 쌓고(깊은 신경망) 비선형 활성화 함수를 사용하면 복잡한 결정 경계를 학습할 수 있습니다." data-en="<strong>Limitation and implication:</strong> A single neuron (perceptron) can only solve linearly separable problems. Real variant data is non-linear. Stacking multiple layers with non-linear activations allows learning arbitrarily complex decision boundaries."></div>
</section>

<hr class="divider">

<!-- SECTION 3: Training — Bias-Variance Tradeoff -->
<section class="section">
  <h2 class="section-title" data-ko="신경망 훈련 — 편향-분산 트레이드오프" data-en="Training a Neural Network — Bias-Variance Tradeoff"></h2>
  <p class="section-body" data-ko="히든 뉴런 수를 바꾸면 모델 용량이 달라집니다. 뉴런이 너무 적으면 과소적합(underfitting), 너무 많으면 과적합(overfitting)이 발생합니다. 슬라이더를 움직여 세 가지 시나리오를 직접 확인하세요." data-en="Changing the number of hidden neurons alters model capacity. Too few neurons leads to underfitting; too many causes overfitting. Move the slider to observe all three scenarios directly."></p>

  <div class="plot-card">
    <div class="ctrl-row">
      <div class="ctrl-label" data-ko="히든 뉴런 수: <span id='neuron-val'>16</span>" data-en="Hidden neurons: <span id='neuron-val'>16</span>"></div>
      <input type="range" id="neuron-slider" min="0" max="5" step="1" value="2" oninput="updateLossPlot(this.value)">
      <div id="neuron-regime" style="font:.82rem/1 system-ui;color:var(--gold);padding:.3rem .7rem;border-radius:5px;background:var(--gold-dim);border:1px solid rgba(196,163,90,.3);white-space:nowrap"></div>
    </div>
    <div id="loss-plot" style="height:400px;"></div>
    <div class="plot-caption" data-ko="파란 선: 훈련 손실. 주황 선: 검증 손실. 검증 손실이 훈련 손실보다 크게 올라가는 지점(epoch ~40)이 과적합 시작점입니다. 히든 뉴런 2개는 과소적합, 16개는 최적, 64개는 명확한 과적합 패턴을 보입니다." data-en="Blue: training loss. Orange: validation loss. The point where validation loss rises above training loss (around epoch 40) marks the onset of overfitting. 2 neurons: underfitting; 16: good fit; 64: clear overfitting."></div>
  </div>

  <div class="insight-box" data-ko="<strong>실용적 해결책:</strong> Early stopping(검증 손실이 오르기 시작할 때 훈련 중단), Dropout(무작위로 뉴런 비활성화), L2 정규화. 모두 복잡도를 제어하는 방법입니다. 유전체학에서는 특히 샘플 수 대비 모델 파라미터 수에 주의해야 합니다." data-en="<strong>Practical solutions:</strong> Early stopping (halt when validation loss rises), Dropout (randomly deactivate neurons), L2 regularization. All control model complexity. In genomics, pay particular attention to the ratio of model parameters to sample size."></div>
</section>

<hr class="divider">

<!-- SECTION 4: Loss Function Intuition -->
<section class="section">
  <h2 class="section-title" data-ko="손실 함수의 직관" data-en="Loss Function Intuition"></h2>
  <p class="section-body" data-ko="Cross-entropy 손실은 예측 신뢰도에 따라 페널티를 다르게 부여합니다. 확신을 가지고 틀렸을 때 가장 큰 손실이 발생합니다. 아래 차트에서 각 예측 시나리오의 손실을 비교하세요." data-en="Cross-entropy loss penalizes differently based on prediction confidence. Being confidently wrong incurs the largest penalty. Compare the loss for each prediction scenario in the chart below."></p>

  <div class="plot-card">
    <div id="loss-intuition-plot" style="height:380px;"></div>
    <div class="plot-caption" data-ko="y축: Cross-entropy 손실 = −log(예측 확률). x축: 5가지 예측 시나리오. 초록색: 올바른 예측. 빨간색: 틀린 예측. 확신이 강할수록 페널티의 차이가 극적으로 커집니다." data-en="y-axis: Cross-entropy loss = −log(predicted probability). x-axis: 5 prediction scenarios. Green: correct. Red: wrong. The more confident the prediction, the more dramatic the penalty gap."></div>
  </div>

  <div class="insight-box" data-ko="<strong>왜 −log(p)인가:</strong> p=1(완벽한 예측) → 손실=0. p=0.5(동전 던지기) → 손실=0.69. p=0.05(확신하며 틀림) → 손실=3.0. 이 비대칭적 페널티가 모델로 하여금 불확실한 예측에는 보수적으로, 확신하는 예측에는 정확하도록 강제합니다." data-en="<strong>Why −log(p):</strong> p=1 (perfect) → loss=0. p=0.5 (coin flip) → loss=0.69. p=0.05 (confidently wrong) → loss=3.0. This asymmetric penalty forces the model to be conservative when uncertain and accurate when confident."></div>
</section>

<script>
/* ── LANGUAGE TOGGLE ── */
let currentLang = 'ko';
function setLang(l){
  currentLang = l;
  document.querySelectorAll('[data-ko]').forEach(el=>{
    el.innerHTML = l==='ko' ? el.dataset.ko : el.dataset.en;
  });
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn:${l==='ko'?'first':'last'}-child`).classList.add('active');
  renderAllPlots();
}
document.querySelectorAll('[data-ko]').forEach(el=>{ el.innerHTML = el.dataset.ko; });

/* ── BILINGUAL PLOT LABELS ── */
const plotLabels = {
  actPlot: {
    xaxis: { ko: '입력 x', en: 'Input x' },
    yaxis: { ko: 'f(x)', en: 'f(x)' },
    annotations: {
      vanishing: { ko: '기울기 소실 영역<br>(Vanishing Gradient)', en: 'Vanishing Gradient<br>Region' },
      dead:      { ko: '죽은 뉴런 구역<br>(Dead Neuron Zone)', en: 'Dead Neuron<br>Zone' }
    }
  },
  boundaryPlot: {
    xaxis: { ko: '진화적 보존도 (Conservation)', en: 'Evolutionary Conservation' },
    yaxis: { ko: '구조적 영향 점수', en: 'Structural Impact Score' },
    traces: [
      { ko: '병원성', en: 'Pathogenic' },
      { ko: '양성', en: 'Benign' },
      { ko: '결정 경계', en: 'Decision boundary' }
    ]
  },
  lossPlot: {
    xaxis: { ko: '에포크', en: 'Epoch' },
    yaxis: { ko: '손실 (Loss)', en: 'Loss' },
    traces: [
      { ko: '훈련 손실 (Train Loss)', en: 'Training Loss' },
      { ko: '검증 손실 (Val Loss)', en: 'Validation Loss' }
    ],
    annotations: {
      overfitting: { ko: '과적합 시작', en: 'Overfitting begins' }
    }
  },
  lossIntuitionPlot: {
    yaxis: { ko: 'Cross-Entropy 손실 = −log(p)', en: 'Cross-Entropy Loss = −log(p)' },
    scenarios: [
      { ko: '확신하며 정답', en: 'Confident Correct' },
      { ko: '적당히 확신', en: 'Moderately sure' },
      { ko: '불확실', en: 'Uncertain' },
      { ko: '적당히 틀림', en: 'Moderately wrong' },
      { ko: '확신하며 틀림', en: 'Confident Wrong' }
    ],
    annotations: [
      { ko: '거의 페널티 없음', en: 'Almost no penalty' },
      { ko: '최대 페널티!', en: 'Maximum penalty!' }
    ]
  }
};

/* ── PLOTLY THEME ── */
const THEME = {
  paper_bgcolor:'rgba(0,0,0,0)',
  plot_bgcolor:'rgba(20,20,31,1)',
  font:{color:'#e4e0d8', family:'system-ui, Georgia, serif'},
  margin:{t:50,b:60,l:65,r:50}
};
const CFG = {responsive:true, displayModeBar:false};

/* ── SECTION 1: ACTIVATION FUNCTIONS ── */
const actVisible = {sigmoid:true, tanh:true, relu:true, lrelu:true};

function sigmoid(x){ return 1/(1+Math.exp(-x)); }
function tanhF(x){ return Math.tanh(x); }
function relu(x){ return Math.max(0,x); }
function lrelu(x){ return x>=0 ? x : 0.01*x; }

const xAct = Array.from({length:200},(_,i)=> -5 + i*(10/199));

function buildActPlot(){
  const traces = [];
  const fns = [
    {key:'sigmoid', fn:sigmoid, color:'#f87171', name:'Sigmoid'},
    {key:'tanh',    fn:tanhF,   color:'#a78bfa', name:'Tanh'},
    {key:'relu',    fn:relu,    color:'#4ade80', name:'ReLU'},
    {key:'lrelu',   fn:lrelu,   color:'#38bdf8', name:'Leaky ReLU'}
  ];
  fns.forEach(f=>{
    if(!actVisible[f.key]) return;
    traces.push({
      x: xAct, y: xAct.map(f.fn),
      type:'scatter', mode:'lines',
      name: f.name,
      line:{color:f.color, width:2.5},
      hovertemplate:`<b>${f.name}</b><br>x=%{x:.2f}<br>f(x)=%{y:.3f}<extra></extra>`
    });
  });

  // Annotations
  const annotations = [];
  if(actVisible.sigmoid || actVisible.tanh){
    annotations.push({
      x:-4.2, y:.08,
      text: plotLabels.actPlot.annotations.vanishing[currentLang],
      showarrow:true, arrowhead:2, arrowcolor:'#f87171',
      font:{color:'#f87171', size:10},
      ax:60, ay:30
    });
  }
  if(actVisible.relu){
    annotations.push({
      x:-2, y:-.08,
      text: plotLabels.actPlot.annotations.dead[currentLang],
      showarrow:true, arrowhead:2, arrowcolor:'#4ade80',
      font:{color:'#4ade80', size:10},
      ax:-10, ay:-40
    });
  }

  const layout = {
    ...THEME,
    xaxis:{gridcolor:'#22222e', zerolinecolor:'#444', title:plotLabels.actPlot.xaxis[currentLang], range:[-5,5], tickfont:{size:11}},
    yaxis:{gridcolor:'#22222e', zerolinecolor:'#444', title:plotLabels.actPlot.yaxis[currentLang], range:[-1.3,1.3], tickfont:{size:11}},
    legend:{orientation:'h', y:1.06, x:.5, xanchor:'center', font:{size:12}},
    annotations,
    shapes:[{type:'line',x0:0,x1:0,y0:-1.3,y1:1.3,line:{color:'#22222e',width:1}},
            {type:'line',x0:-5,x1:5,y0:0,y1:0,line:{color:'#22222e',width:1}}],
    height:380
  };
  Plotly.react('act-plot', traces.length ? traces : [{x:[0],y:[0],type:'scatter',mode:'markers',marker:{opacity:0}}], layout, CFG);
}

function toggleAct(key){
  actVisible[key] = !actVisible[key];
  const btn = document.getElementById(`btn-${key}`);
  btn.classList.toggle('active');
  buildActPlot();
}

buildActPlot();

/* ── SECTION 2: DECISION BOUNDARY ── */
// Generate synthetic variant data (seeded)
function seededRand(s){ return Math.abs((Math.sin(s)*43758.5453123)%1); }

const variantData = (()=>{
  const path=[], benign=[];
  for(let i=0;i<50;i++){
    // pathogenic: high conservation + high structural impact
    const cx = 0.5 + seededRand(i*3)*0.5;
    const cy = 0.4 + seededRand(i*3+1)*0.6;
    path.push([cx, cy]);
  }
  for(let i=0;i<50;i++){
    // benign: low conservation or low structural impact
    const cx = seededRand(i*7)*0.7;
    const cy = seededRand(i*7+2)*0.6;
    benign.push([cx, cy]);
  }
  return {path, benign};
})();

function updateBoundary(){
  const w1 = parseFloat(document.getElementById('w1-slider').value);
  const w2 = parseFloat(document.getElementById('w2-slider').value);
  const b  = parseFloat(document.getElementById('b-slider').value);
  document.getElementById('w1-val').textContent = w1.toFixed(1);
  document.getElementById('w2-val').textContent = w2.toFixed(1);
  document.getElementById('b-val').textContent  = b.toFixed(1);

  // Compute accuracy
  let correct = 0;
  variantData.path.forEach(([x,y])=>{ if(w1*x+w2*y+b>0) correct++; });
  variantData.benign.forEach(([x,y])=>{ if(w1*x+w2*y+b<=0) correct++; });
  const acc = (correct/100*100).toFixed(1);

  document.getElementById('boundary-stats').innerHTML = `
    <div class="stat-chip"><div class="v">${acc}%</div><div class="l">${currentLang==='ko'?'정확도':'Accuracy'}</div></div>
    <div class="stat-chip"><div class="v" style="color:#f87171">50</div><div class="l">${currentLang==='ko'?'병원성 (실제)':'Pathogenic (true)'}</div></div>
    <div class="stat-chip"><div class="v" style="color:#38bdf8">50</div><div class="l">${currentLang==='ko'?'양성 (실제)':'Benign (true)'}</div></div>
    <div class="stat-chip"><div class="v" style="color:#c4a35a">${w1.toFixed(1)}x+${w2.toFixed(1)}y+${b.toFixed(1)}=0</div><div class="l">${currentLang==='ko'?'결정 경계':'Decision boundary'}</div></div>
  `;

  // Decision boundary line: y = (-w1*x - b) / w2
  const xLine = [0, 1];
  const yLine = w2 !== 0 ? xLine.map(x=>(-w1*x-b)/w2) : [0,0];

  const traces = [
    {
      x: variantData.path.map(p=>p[0]),
      y: variantData.path.map(p=>p[1]),
      type:'scatter', mode:'markers',
      name: plotLabels.boundaryPlot.traces[0][currentLang],
      marker:{color:'#f87171', size:9, opacity:.8, line:{color:'rgba(0,0,0,.3)',width:1}},
      hovertemplate:`<b>${plotLabels.boundaryPlot.traces[0][currentLang]}</b><br>Conservation: %{x:.2f}<br>Structural: %{y:.2f}<extra></extra>`
    },
    {
      x: variantData.benign.map(p=>p[0]),
      y: variantData.benign.map(p=>p[1]),
      type:'scatter', mode:'markers',
      name: plotLabels.boundaryPlot.traces[1][currentLang],
      marker:{color:'#38bdf8', size:9, opacity:.8, line:{color:'rgba(0,0,0,.3)',width:1}},
      hovertemplate:`<b>${plotLabels.boundaryPlot.traces[1][currentLang]}</b><br>Conservation: %{x:.2f}<br>Structural: %{y:.2f}<extra></extra>`
    },
    {
      x: xLine, y: yLine,
      type:'scatter', mode:'lines',
      name: plotLabels.boundaryPlot.traces[2][currentLang],
      line:{color:'#c4a35a', width:2.5, dash:'dash'},
      hoverinfo:'skip'
    }
  ];

  const layout = {
    ...THEME,
    xaxis:{gridcolor:'#22222e', title: plotLabels.boundaryPlot.xaxis[currentLang], range:[0,1], tickfont:{size:11}},
    yaxis:{gridcolor:'#22222e', title: plotLabels.boundaryPlot.yaxis[currentLang], range:[0,1], tickfont:{size:11}},
    legend:{orientation:'h', y:1.06, x:.5, xanchor:'center', font:{size:11}},
    height:400
  };
  Plotly.react('boundary-plot', traces, layout, CFG);
}

updateBoundary();

/* ── SECTION 3: TRAINING LOSS CURVES ── */
const NEURON_CONFIGS = [
  {n:2,   label:'2',  regime_ko:'과소적합 (Underfitting)', regime_en:'Underfitting'},
  {n:4,   label:'4',  regime_ko:'약한 과소적합',           regime_en:'Slight Underfitting'},
  {n:8,   label:'8',  regime_ko:'양호한 수렴',              regime_en:'Good Convergence'},
  {n:16,  label:'16', regime_ko:'최적 (Optimal)',           regime_en:'Optimal'},
  {n:32,  label:'32', regime_ko:'약한 과적합',              regime_en:'Slight Overfitting'},
  {n:64,  label:'64', regime_ko:'명확한 과적합 (Overfitting)', regime_en:'Clear Overfitting'},
];

function genLossCurves(cfgIdx){
  const cfg = NEURON_CONFIGS[cfgIdx];
  const epochs = Array.from({length:100},(_,i)=>i+1);
  const trainLoss=[], valLoss=[];

  if(cfgIdx <= 1){
    // underfitting: both losses plateau high
    const floor = 1.2 - cfgIdx*0.3;
    epochs.forEach(e=>{
      const t = e/100;
      const noise = (Math.sin(e*1.7)*0.02);
      trainLoss.push(floor + (2.0-floor)*Math.exp(-2*t) + noise);
      valLoss.push(floor + 0.1 + (2.1-floor)*Math.exp(-1.8*t) + noise*0.8);
    });
  } else if(cfgIdx <= 3){
    // good convergence
    const floor = 0.12 + (3-cfgIdx)*0.04;
    epochs.forEach(e=>{
      const t = e/100;
      const noise = (Math.sin(e*2.3)*0.015);
      trainLoss.push(floor + (2.0-floor)*Math.exp(-4*t) + noise);
      valLoss.push(floor + 0.08 + (2.1-floor)*Math.exp(-3.5*t) + noise*0.6 + Math.max(0,(t-0.6)*0.1));
    });
  } else {
    // overfitting: training keeps dropping, validation rises
    const overStart = cfgIdx === 4 ? 0.55 : 0.35;
    const overMag = (cfgIdx-3)*0.5;
    epochs.forEach(e=>{
      const t = e/100;
      const noise = (Math.sin(e*1.9)*0.015);
      trainLoss.push(0.05 + 1.95*Math.exp(-5.5*t) + noise);
      const base = 0.18 + 1.92*Math.exp(-3.5*t);
      const overfit = Math.max(0,(t-overStart)*overMag);
      valLoss.push(base + overfit + noise*0.5);
    });
  }
  return {epochs, trainLoss, valLoss};
}

function updateLossPlot(cfgIdx){
  cfgIdx = parseInt(cfgIdx);
  const cfg = NEURON_CONFIGS[cfgIdx];
  document.getElementById('neuron-val').textContent = cfg.n;
  const regime = document.getElementById('neuron-regime');
  regime.textContent = currentLang==='ko' ? cfg.regime_ko : cfg.regime_en;

  const {epochs, trainLoss, valLoss} = genLossCurves(cfgIdx);

  // Find overfitting point (where val > train by margin)
  let overEpoch = null;
  if(cfgIdx >= 4){
    for(let i=10;i<epochs.length;i++){
      if(valLoss[i] > trainLoss[i] + 0.05){ overEpoch = i+1; break; }
    }
  }

  const traces = [
    {
      x:epochs, y:trainLoss,
      type:'scatter', mode:'lines',
      name: plotLabels.lossPlot.traces[0][currentLang],
      line:{color:'#38bdf8', width:2.5},
      fill:'tozeroy', fillcolor:'rgba(56,189,248,.05)'
    },
    {
      x:epochs, y:valLoss,
      type:'scatter', mode:'lines',
      name: plotLabels.lossPlot.traces[1][currentLang],
      line:{color:'#f87171', width:2.5},
      fill:'tozeroy', fillcolor:'rgba(248,113,113,.05)'
    }
  ];

  const annotations = [];
  const shapes = [];
  if(overEpoch){
    shapes.push({
      type:'line', x0:overEpoch, x1:overEpoch, y0:0, y1:2.5,
      line:{color:'rgba(248,113,113,.4)', width:1.5, dash:'dot'}
    });
    annotations.push({
      x:overEpoch, y:valLoss[overEpoch-1]+0.2,
      text: plotLabels.lossPlot.annotations.overfitting[currentLang],
      showarrow:true, arrowhead:2, arrowcolor:'#f87171',
      font:{color:'#f87171', size:11},
      ax:40, ay:-20
    });
  }

  const layout = {
    ...THEME,
    xaxis:{gridcolor:'#22222e', title:plotLabels.lossPlot.xaxis[currentLang], range:[1,100], tickfont:{size:11}},
    yaxis:{gridcolor:'#22222e', title: plotLabels.lossPlot.yaxis[currentLang], range:[0,2.4], tickfont:{size:11}},
    legend:{orientation:'h', y:1.06, x:.5, xanchor:'center', font:{size:11}},
    annotations,
    shapes,
    height:400
  };
  Plotly.react('loss-plot', traces, layout, CFG);
}

updateLossPlot(2); // default: 8 neurons

/* ── SECTION 4: LOSS FUNCTION INTUITION ── */
function buildLossIntuitionPlot(){
  const scenarioProbs = [
    {prob:0.95, correct:true,  suffix: currentLang==='ko'?'(0.95→정답)':'(0.95→correct)'},
    {prob:0.80, correct:true,  suffix: currentLang==='ko'?'(0.80→정답)':'(0.80→correct)'},
    {prob:0.50, correct:true,  suffix: currentLang==='ko'?'(0.50→정답)':'(0.50→correct)'},
    {prob:0.20, correct:false, suffix: currentLang==='ko'?'(0.20→오답)':'(0.20→wrong)'},
    {prob:0.05, correct:false, suffix: currentLang==='ko'?'(0.05→오답)':'(0.05→wrong)'},
  ];
  const scenarios = scenarioProbs.map((s,i)=>({
    ...s,
    label: `${plotLabels.lossIntuitionPlot.scenarios[i][currentLang]}\n${s.suffix}`
  }));

  const losses = scenarios.map(s => s.correct ? -Math.log(s.prob) : -Math.log(1-s.prob));
  const colors = scenarios.map(s => {
    if(!s.correct) return '#f87171';
    if(s.prob >= 0.8) return '#4ade80';
    return '#c4a35a';
  });
  const labels = scenarios.map(s => `${(s.prob*100).toFixed(0)}%`);

  const trace = {
    type:'bar',
    x: scenarios.map(s=>s.label.split('\n')[0]),
    y: losses,
    text: losses.map(l=>`Loss: ${l.toFixed(2)}`),
    textposition:'outside',
    marker:{color: colors, opacity:.85, line:{color:'rgba(0,0,0,.3)',width:1}},
    hovertemplate: scenarios.map((s,i)=>
      `<b>${s.label.replace('\n',' ')}</b><br>Predicted prob: ${(s.prob*100).toFixed(0)}%<br>Loss: ${losses[i].toFixed(3)}<extra></extra>`
    )
  };

  const annotations = [
    {x:0, y:losses[0]+0.15, text: plotLabels.lossIntuitionPlot.annotations[0][currentLang], showarrow:false, font:{color:'#4ade80',size:10}},
    {x:4, y:losses[4]+0.15, text: plotLabels.lossIntuitionPlot.annotations[1][currentLang], showarrow:false, font:{color:'#f87171',size:10}},
  ];

  const layout = {
    ...THEME,
    xaxis:{gridcolor:'#22222e', tickfont:{size:11}},
    yaxis:{gridcolor:'#22222e', title:plotLabels.lossIntuitionPlot.yaxis[currentLang], tickfont:{size:11}, range:[0,3.5]},
    showlegend:false,
    annotations,
    height:380
  };
  Plotly.react('loss-intuition-plot', [trace], layout, CFG);
}

buildLossIntuitionPlot();

/* ── RE-RENDER ON LANG CHANGE ── */
function renderAllPlots(){
  buildActPlot();
  updateBoundary();
  updateLossPlot(parseInt(document.getElementById('neuron-slider').value));
  buildLossIntuitionPlot();
}
