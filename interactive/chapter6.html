<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 6 — Evolutionary Conservation and Traditional Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
<style>
:root{--bg:#0b0b11;--card:#14141f;--text:#e4e0d8;--muted:#7a756d;--gold:#c4a35a;--gold-dim:rgba(196,163,90,.12);--green:#4ade80;--red:#f87171;--blue:#38bdf8;--purple:#a78bfa;--line:#22222e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Noto Serif KR',serif;line-height:1.7;overflow-x:hidden}
.lang-toggle{position:fixed;top:1rem;right:1.5rem;z-index:100;display:flex;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(10px);background:rgba(11,11,17,.7)}
.lang-btn{background:0;color:rgba(255,255,255,.4);border:0;padding:.35rem .8rem;cursor:pointer;font:700 .78rem/1 system-ui;transition:.2s}
.lang-btn.active{color:#fff;background:rgba(255,255,255,.1)}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;position:relative;overflow:hidden;background:radial-gradient(ellipse at 50% 40%, rgba(167,139,250,.05) 0%, transparent 60%)}
.hero-ch{font:700 .82rem/1 'SF Mono',monospace;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1.5rem}
.hero h1{font-family:'Playfair Display',Georgia,serif;font-weight:900;font-size:clamp(2.2rem,5.5vw,4.2rem);line-height:1.05;letter-spacing:-.02em;color:#fff;max-width:860px;margin-bottom:1.5rem}
.hero-sub{font-size:1.05rem;color:var(--muted);max-width:560px;line-height:1.6}
.hero-scroll{position:absolute;bottom:2.5rem;color:var(--muted);font:.8rem/1.2 system-ui;animation:bob 2s ease-in-out infinite;cursor:pointer}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
.section{padding:6rem 2rem;max-width:960px;margin:0 auto}
.section-label{font:700 .78rem/1 'SF Mono',monospace;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.section-title{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.1;color:#fff;margin-bottom:1.2rem}
.section-body{font-size:1rem;color:var(--muted);line-height:1.8;max-width:680px;margin-bottom:2.5rem}
hr.divider{border:none;border-top:1px solid var(--line);margin:0 2rem}
.plot-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:1.5rem;margin-bottom:2rem}
.plot-caption{font:.85rem/1.5 system-ui;color:var(--muted);margin-top:1rem;text-align:center}
</style>
</head>
<body>
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('ko')">KO</button>
  <button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<section class="hero">
  <div class="hero-ch">Chapter 6</div>
  <h1 data-ko="진화적 보존성과 전통적 도구" data-en="Evolutionary Conservation and Traditional Tools"></h1>
  <p class="hero-sub" data-ko="종간 서열 보존을 측정하고, SIFT·PolyPhen-2·pLI로 변이의 병원성을 예측합니다." data-en="Measure sequence conservation across species and predict variant pathogenicity with SIFT, PolyPhen-2, and pLI."></p>
  <div class="hero-scroll" onclick="document.querySelector('.section').scrollIntoView({behavior:'smooth'})">&#9662; scroll</div>
</section>

<!-- Section 1: Conservation Heatmap -->
<section class="section">
  <div class="section-label" data-ko="종간 서열 보존성" data-en="Conservation Across Species"></div>
  <h2 class="section-title" data-ko="어느 염기가 6억 년 동안 살아남았나?" data-en="Which Bases Survived 600 Million Years of Evolution?"></h2>
  <p class="section-body" data-ko="인간, 침팬지, 마우스, 개, 닭, 제브라피시 6종에 걸쳐 20개 게놈 위치의 염기 일치 여부를 히트맵으로 표시합니다. 하단 막대 차트는 PhyloP 점수(양수=보존, 음수=빠른 진화)를 나타냅니다." data-en="Heatmap of nucleotide identity across 20 genomic positions in 6 species. The bar chart below shows PhyloP scores (positive = conserved, negative = fast-evolving)."></p>
  <div class="plot-box">
    <div id="conservation-heatmap" style="height:320px"></div>
    <p class="plot-caption" data-ko="색상: A=초록, T=빨강, C=파랑, G=금색, 갭=회색" data-en="Color: A=green, T=red, C=blue, G=gold, gap=gray"></p>
  </div>
  <div class="plot-box">
    <div id="phylop-bar" style="height:240px"></div>
    <p class="plot-caption" data-ko="PhyloP 점수: 양수(보존된 위치)는 초록, 음수(빠른 진화)는 빨강으로 표시됩니다." data-en="PhyloP score: positive (conserved) in green, negative (fast-evolving) in red."></p>
  </div>
</section>

<hr class="divider">

<!-- Section 2: SIFT vs PolyPhen -->
<section class="section">
  <div class="section-label" data-ko="SIFT vs PolyPhen-2 예측 비교" data-en="SIFT vs PolyPhen-2 Predictions"></div>
  <h2 class="section-title" data-ko="두 도구는 얼마나 일치하는가?" data-en="How Often Do the Two Tools Agree?"></h2>
  <p class="section-body" data-ko="~200개의 합성 변이를 ClinVar 분류(병원성=빨강, 양성=초록, VUS=회색)에 따라 색칠하고 SIFT 점수(x)와 PolyPhen-2 점수(y)로 배치합니다. 두 도구가 일치하는 사분면과 의견이 갈리는 영역을 확인하세요." data-en="~200 synthetic variants colored by ClinVar class (pathogenic=red, benign=green, VUS=gray) plotted by SIFT score (x) vs PolyPhen-2 score (y). Examine where the tools agree and where they diverge."></p>
  <div class="plot-box">
    <div id="sift-poly-plot" style="height:500px"></div>
    <p class="plot-caption" data-ko="SIFT < 0.05 AND PolyPhen > 0.85: 두 도구 모두 병원성 예측. SIFT ≥ 0.05 AND PolyPhen ≤ 0.85: 두 도구 모두 양성 예측." data-en="SIFT < 0.05 AND PolyPhen > 0.85: both tools predict pathogenic. SIFT >= 0.05 AND PolyPhen <= 0.85: both tools predict benign."></p>
  </div>
</section>

<hr class="divider">

<!-- Section 3: Gene Constraint -->
<section class="section">
  <div class="section-label" data-ko="유전자 제약 점수 (pLI / LOEUF)" data-en="Gene Constraint (pLI and LOEUF)"></div>
  <h2 class="section-title" data-ko="어떤 유전자가 변이를 허용하지 않는가?" data-en="Which Genes Tolerate Almost No Loss-of-Function?"></h2>
  <p class="section-body" data-ko="높은 pLI 점수는 해당 유전자가 기능 상실 변이를 거의 허용하지 않음을 의미합니다. MECP2, SCN1A, BRCA1은 매우 제약된 유전자이며, 후각 수용체 유전자나 일부 면역 유전자는 변이에 내성이 있습니다." data-en="High pLI indicates a gene tolerates almost no loss-of-function variants. MECP2, SCN1A, and BRCA1 are highly constrained, while olfactory receptors and some immune genes are tolerant."></p>
  <div class="plot-box">
    <div id="constraint-bar" style="height:420px"></div>
    <p class="plot-caption" data-ko="색상 그라디언트: 빨강(높은 제약) → 초록(낮은 제약). pLI > 0.9는 기능 상실에 불내성으로 간주됩니다." data-en="Color gradient: red (highly constrained) to green (tolerant). pLI > 0.9 is considered intolerant to loss-of-function."></p>
  </div>
</section>

<script>
let currentLang = 'ko';
function setLang(l) {
  currentLang = l;
  document.querySelectorAll('[data-ko]').forEach(el => { el.textContent = el.dataset[l]; });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.lang-btn:' + (l==='ko' ? 'first' : 'last') + '-child').classList.add('active');
  updatePlotLanguage(l);
}
document.querySelectorAll('[data-ko]').forEach(el => { el.textContent = el.dataset.ko; });

// ── Bilingual plot labels ─────────────────────────────────────────────────────
const plotLabels = {
  conservationHeatmap: {
    xaxis: { ko: '게놈 위치', en: 'Genomic Position' }
  },
  phylopBar: {
    yaxis: { ko: 'PhyloP 점수', en: 'PhyloP Score' }
  },
  siftPolyPlot: {
    xaxis: { ko: 'SIFT 점수 (0=유해, 1=허용)', en: 'SIFT Score (0=deleterious, 1=tolerated)' },
    yaxis: { ko: 'PolyPhen-2 점수 (0=양성, 1=아마도 유해)', en: 'PolyPhen-2 Score (0=benign, 1=probably damaging)' },
    traces: [
      { ko: '병원성', en: 'Pathogenic' },
      { ko: '양성',   en: 'Benign' },
      { ko: 'VUS',    en: 'VUS' }
    ],
    annotations: [
      { ko: '일치:\n병원성',           en: 'Agree:\nPathogenic' },
      { ko: '일치:\n양성',             en: 'Agree:\nBenign' },
      { ko: '불일치:\n추가 증거 필요', en: 'Disagree:\nMore evidence needed' },
      { ko: '불일치:\n추가 증거 필요', en: 'Disagree:\nMore evidence needed' }
    ]
  },
  constraintBar: {
    xaxis: { ko: 'pLI 점수', en: 'pLI Score' },
    annotation: { ko: 'pLI > 0.9\n불내성', en: 'pLI > 0.9\nintolerant' }
  }
};

function updatePlotLanguage(l) {
  // conservation-heatmap
  const ch = document.getElementById('conservation-heatmap');
  if (ch && ch.data && ch.data.length) {
    Plotly.relayout(ch, { 'xaxis.title.text': plotLabels.conservationHeatmap.xaxis[l] });
  }

  // phylop-bar
  const pb = document.getElementById('phylop-bar');
  if (pb && pb.data && pb.data.length) {
    Plotly.relayout(pb, { 'yaxis.title.text': plotLabels.phylopBar.yaxis[l] });
  }

  // sift-poly-plot
  const sp = document.getElementById('sift-poly-plot');
  if (sp && sp.data && sp.data.length) {
    const annColors = ['#f87171','#4ade80','#c4a35a','#c4a35a'];
    const annBg = ['rgba(248,113,113,.1)','rgba(74,222,128,.1)','rgba(196,163,90,.1)','rgba(196,163,90,.1)'];
    const annPos = [{x:0.025,y:0.925},{x:0.75,y:0.15},{x:0.75,y:0.925},{x:0.025,y:0.15}];
    Plotly.relayout(sp, {
      'xaxis.title.text': plotLabels.siftPolyPlot.xaxis[l],
      'yaxis.title.text': plotLabels.siftPolyPlot.yaxis[l],
      annotations: plotLabels.siftPolyPlot.annotations.map((a, i) => ({
        x: annPos[i].x, y: annPos[i].y,
        text: a[l].replace('\n', '<br>'),
        showarrow: false, font: { size:10, color: annColors[i] },
        xanchor: 'center', bgcolor: annBg[i], borderpad: 4
      }))
    });
    plotLabels.siftPolyPlot.traces.forEach((t, i) => {
      Plotly.restyle(sp, { name: t[l] }, [i]);
    });
  }

  // constraint-bar
  const cb = document.getElementById('constraint-bar');
  if (cb && cb.data && cb.data.length) {
    Plotly.relayout(cb, {
      'xaxis.title.text': plotLabels.constraintBar.xaxis[l],
      annotations: [{ x:0.91, y:5,
        text: plotLabels.constraintBar.annotation[l].replace('\n','<br>'),
        showarrow:false, font:{size:10,color:'#f87171'}, xanchor:'left' }]
    });
  }
}

const darkLayout = {
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(20,20,31,1)',
  font: { color: '#e4e0d8', family: 'system-ui, sans-serif' }
};
const cfg = { responsive: true, displayModeBar: false };

// ── Conservation Heatmap ──────────────────────────────────────────────────────
(function buildConservation() {
  const species = ['Human', 'Chimp', 'Mouse', 'Dog', 'Chicken', 'Zebrafish'];
  const bases = ['A','T','C','G','-'];
  const baseColor = { A: 0, T: 1, C: 2, G: 3, '-': 4 };
  const colorscale = [
    [0,    '#4ade80'],  // A = green
    [0.25, '#f87171'],  // T = red
    [0.5,  '#38bdf8'],  // C = blue
    [0.75, '#c4a35a'],  // G = gold
    [1.0,  '#44444f']   // gap = gray
  ];
  // Deterministic sequence data (conserved positions 5-10, variable elsewhere)
  const seqData = [
    // Human (reference)
    [0,2,3,1,0,0,0,0,0,0,2,1,3,0,2,1,0,3,2,1],
    // Chimp (very similar to human)
    [0,2,3,1,0,0,0,0,0,0,2,1,3,0,2,1,0,3,2,1],
    // Mouse (conserved core, some differences)
    [0,2,3,1,0,0,0,0,0,0,2,3,3,0,2,1,3,3,2,1],
    // Dog
    [3,2,3,1,0,0,0,0,0,0,2,1,3,1,2,1,0,3,0,1],
    // Chicken
    [0,1,3,1,0,0,0,4,0,0,2,1,3,0,1,3,0,3,2,1],
    // Zebrafish
    [3,2,4,1,0,0,0,4,0,4,2,1,1,0,2,1,0,0,2,3]
  ];
  const positions = Array.from({length:20}, (_,i) => `Pos ${i+1}`);
  Plotly.newPlot('conservation-heatmap', [{
    type: 'heatmap',
    z: seqData,
    x: positions,
    y: species,
    colorscale,
    zmin: 0, zmax: 4,
    showscale: false,
    hoverongaps: false,
    hovertemplate: 'Species: %{y}<br>Position: %{x}<br>Base: %{z}<extra></extra>'
  }], {
    ...darkLayout,
    xaxis: { gridcolor:'#22222e', tickfont:{size:10}, title: plotLabels.conservationHeatmap.xaxis[currentLang], titlefont:{size:12} },
    yaxis: { gridcolor:'#22222e', tickfont:{size:12} },
    margin: { t:20, r:20, b:60, l:90 }
  }, cfg);
})();

// ── PhyloP Bar ────────────────────────────────────────────────────────────────
(function buildPhyloP() {
  // Conserved positions 4-10 (0-indexed), fast-evolving at 12,15,17
  const phylop = [0.8, 1.2, 0.3, 0.5, 3.1, 4.2, 3.8, 2.9, 3.5, 4.0, 2.1, 0.4, -1.2, 0.6, 0.2, -0.8, 0.9, -1.5, 0.3, 0.7];
  const colors = phylop.map(v => v >= 0 ? '#4ade80' : '#f87171');
  const positions = Array.from({length:20}, (_,i) => `Pos ${i+1}`);
  Plotly.newPlot('phylop-bar', [{
    type: 'bar',
    x: positions,
    y: phylop,
    marker: { color: colors, opacity: 0.85 },
    hovertemplate: '%{x}<br>PhyloP: %{y:.2f}<extra></extra>'
  }], {
    ...darkLayout,
    shapes: [{ type:'line', x0:-0.5, x1:19.5, y0:0, y1:0, line:{color:'#7a756d',width:1,dash:'dot'} }],
    xaxis: { gridcolor:'#22222e', tickfont:{size:10} },
    yaxis: { gridcolor:'#22222e', title: plotLabels.phylopBar.yaxis[currentLang], titlefont:{size:12},
      zeroline:false },
    margin: { t:20, r:20, b:60, l:70 }
  }, cfg);
})();

// ── SIFT vs PolyPhen scatter ──────────────────────────────────────────────────
(function buildSiftPoly() {
  // Seeded PRNG
  let seed = 12345;
  function r() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }

  const classes = [
    { label:'Pathogenic', n:70, color:'#f87171',
      siftFn: () => r() * 0.15,          // low SIFT (deleterious)
      polyFn: () => 0.6 + r() * 0.4 },   // high PolyPhen
    { label:'Benign', n:80, color:'#4ade80',
      siftFn: () => 0.3 + r() * 0.7,     // high SIFT (tolerated)
      polyFn: () => r() * 0.5 },          // low PolyPhen
    { label:'VUS', n:50, color:'#7a756d',
      siftFn: () => r() * 0.5,
      polyFn: () => r() * 0.8 }
  ];

  const traceLabels = plotLabels.siftPolyPlot.traces;
  const traces = classes.map((c, ci) => {
    const xs = [], ys = [];
    for (let i = 0; i < c.n; i++) { xs.push(c.siftFn()); ys.push(c.polyFn()); }
    return {
      type:'scatter', mode:'markers', name: traceLabels[ci][currentLang],
      x: xs, y: ys,
      marker: { color: c.color, size: 7, opacity: 0.75, line:{color:'#0b0b11',width:0.5} },
      hovertemplate: `<b>${traceLabels[ci][currentLang]}</b><br>SIFT: %{x:.3f}<br>PolyPhen-2: %{y:.3f}<extra></extra>`
    };
  });

  const annColors = ['#f87171','#4ade80','#c4a35a','#c4a35a'];
  const annBg = ['rgba(248,113,113,.1)','rgba(74,222,128,.1)','rgba(196,163,90,.1)','rgba(196,163,90,.1)'];
  const annPos = [{x:0.025,y:0.925},{x:0.75,y:0.15},{x:0.75,y:0.925},{x:0.025,y:0.15}];
  const quadAnnotations = plotLabels.siftPolyPlot.annotations.map((a, i) => ({
    x: annPos[i].x, y: annPos[i].y,
    text: a[currentLang].replace('\n', '<br>'),
    showarrow: false, font: { size:10, color: annColors[i] },
    xanchor: 'center', bgcolor: annBg[i], borderpad: 4
  }));

  Plotly.newPlot('sift-poly-plot', traces, {
    ...darkLayout,
    shapes: [
      { type:'line', x0:0.05, x1:0.05, y0:0, y1:1, line:{color:'#7a756d',width:1.5,dash:'dash'} },
      { type:'line', x0:0, x1:1, y0:0.85, y1:0.85, line:{color:'#7a756d',width:1.5,dash:'dash'} }
    ],
    annotations: quadAnnotations,
    xaxis: { gridcolor:'#22222e', title: plotLabels.siftPolyPlot.xaxis[currentLang], range:[0,1], titlefont:{size:12} },
    yaxis: { gridcolor:'#22222e', title: plotLabels.siftPolyPlot.yaxis[currentLang], range:[0,1], titlefont:{size:12} },
    legend: { x:0.7, y:0.5, bgcolor:'rgba(0,0,0,0)', bordercolor:'#22222e', borderwidth:1 },
    margin: { t:30, r:30, b:70, l:80 }
  }, cfg);
})();

// ── Gene Constraint Bar ────────────────────────────────────────────────────────
(function buildConstraint() {
  const genes = [
    { name:'MECP2', pli:0.99 },
    { name:'SCN1A', pli:0.97 },
    { name:'BRCA1', pli:0.95 },
    { name:'TP53',  pli:0.88 },
    { name:'CFTR',  pli:0.74 },
    { name:'APC',   pli:0.61 },
    { name:'APOE',  pli:0.35 },
    { name:'HLA-A', pli:0.18 },
    { name:'OR2T3', pli:0.06 },
    { name:'OR4A5', pli:0.02 }
  ];
  // Color: red (high pLI) to green (low pLI)
  function pliColor(v) {
    const r = Math.round(248 + (74-248)*v);
    const g = Math.round(113 + (222-113)*v);
    const b = Math.round(113 + (128-113)*v);
    return `rgb(${r},${g},${b})`;
  }
  Plotly.newPlot('constraint-bar', [{
    type: 'bar',
    orientation: 'h',
    x: genes.map(g => g.pli),
    y: genes.map(g => g.name),
    marker: { color: genes.map(g => pliColor(1 - g.pli)), opacity: 0.9 },
    hovertemplate: '<b>%{y}</b><br>pLI: %{x:.2f}<extra></extra>'
  }], {
    ...darkLayout,
    shapes: [{ type:'line', x0:0.9, x1:0.9, y0:-0.5, y1:9.5,
      line:{color:'#f87171',width:1.5,dash:'dot'} }],
    annotations: [{ x:0.91, y:5, text: plotLabels.constraintBar.annotation[currentLang].replace('\n','<br>'),
      showarrow:false, font:{size:10,color:'#f87171'}, xanchor:'left' }],
    xaxis: { gridcolor:'#22222e', title: plotLabels.constraintBar.xaxis[currentLang], range:[0,1.05], titlefont:{size:12} },
    yaxis: { gridcolor:'#22222e', tickfont:{size:13}, autorange:'reversed' },
    margin: { t:30, r:50, b:60, l:90 }
  }, cfg);
})();
</script>
</body>
</html>
